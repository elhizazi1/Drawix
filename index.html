<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawix Pro - منصة التحكم وإعدادات الشرح</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 90%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .link-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .links-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">Drawix Pro</h1>
        <p class="subtitle">منصة الشرح والرسم الذكية على الشاشة. أداة احترافية تمنحك التحكم الكامل لإنشاء شروحات تفاعلية وحماية بياناتك بلمسة واحدة.</p>

        <div class="links-grid">
            <a href="privacy.html" class="link-card">سياسة الخصوصية</a>
            <a href="terms.html" class="link-card">اتفاقية الاستخدام</a>
        </div>

        <div class="footer">
            تم التطوير بواسطة <a href="https://siwane.xyz" target="_blank">Siwane</a><br><br>
            للتواصل والدعم: jamal@elhizazi.me
        </div>
    </div>

</body>
</html>
